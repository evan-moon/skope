<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="113" fill="#0a0a0a"/>
  <circle cx="256" cy="256" r="170" fill="url(#glow)"/>

  <!-- Scope rings (the lens) -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#38bdf8" stroke-width="12" stroke-opacity="0.30"/>
  <circle cx="256" cy="256" r="102" fill="none" stroke="#38bdf8" stroke-width="14" stroke-opacity="0.55"/>
  <circle cx="256" cy="256" r="56"  fill="none" stroke="#38bdf8" stroke-width="16" stroke-opacity="0.85"/>

  <!-- Crosshair ticks -->
  <g stroke="#38bdf8" stroke-width="14" stroke-linecap="round" stroke-opacity="0.65">
    <line x1="256" y1="60"  x2="256" y2="92"/>
    <line x1="256" y1="420" x2="256" y2="452"/>
    <line x1="60"  y1="256" x2="92"  y2="256"/>
    <line x1="420" y1="256" x2="452" y2="256"/>
  </g>

  <!-- Center node -->
  <circle cx="256" cy="256" r="22" fill="#38bdf8"/>

  <!-- The one signal that reaches you (amber blip) -->
  <line x1="256" y1="256" x2="358" y2="154" stroke="#fbbf24" stroke-width="10" stroke-linecap="round" stroke-opacity="0.55"/>
  <circle cx="358" cy="154" r="30" fill="#fbbf24" fill-opacity="0.18"/>
  <circle cx="358" cy="154" r="17" fill="#fbbf24"/>
</svg>
