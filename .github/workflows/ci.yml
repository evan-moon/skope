name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Build · Typecheck · Lint · E2E
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install build tools
        run: sudo apt-get install -y build-essential python3

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn turbo run build --filter='./packages/*/*'

      - name: Build apps
        run: |
          yarn workspace @skope/mcp build
          yarn workspace @evan-moon/skope build

      - name: Type check
        run: yarn typecheck

      - name: Lint
        run: yarn biome check .

      - name: End-to-end MCP tests
        run: |
          for f in test/mcp-tests.mjs test/mcp-tests-2.mjs test/mcp-tests-3.mjs test/mcp-tests-4.mjs test/mcp-tests-5.mjs; do
            echo "── $f ──"
            node "$f" || exit 1
          done
